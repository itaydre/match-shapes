<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Shapes · One Reveal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: light; }
      html, body, #root {
        margin: 0; min-height: 100%; background: #FFFFFF;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #0A0A0A;
      }
      * { box-sizing: border-box; }
      .shape-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
      @media (max-width: 720px) {
        .shape-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./all-shapes-anim.tsx"></script>
  </body>
</html>
