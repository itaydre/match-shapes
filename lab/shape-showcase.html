<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shape Lab — Gallery Reveal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: light; }
      html, body, #root {
        margin: 0; min-height: 100%; background: #FFFFFF;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #0A0A0A;
      }
      * { box-sizing: border-box; }
      /* Mobile: stack all cards in a single column, one per row,
         under each other — no grid wrapping into multiple rows. */
      .shape-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
      @media (max-width: 720px) {
        .shape-grid {
          grid-template-columns: 1fr !important;
          gap: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./shape-showcase.tsx"></script>
  </body>
</html>
